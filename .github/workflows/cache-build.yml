name: Build Domain Cache

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fetch-tlds:
    runs-on: ubuntu-latest
    outputs:
      tld-groups: ${{ steps.fetch.outputs.groups }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: cache-builder
      - name: build cache builder
        run: cargo build --profile ci --bin cache-builder
      - name: stage binaries
        run: |
          mkdir -p staging
          cp target/ci/cache-builder staging/
      - name: upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: staging/
      - name: fetch and filter TLDs
        id: fetch
        run: |
          if ./target/ci/cache-builder fetch-tlds > tld-groups.json; then
            echo "cache-builder succeeded, output: $(wc -c < tld-groups.json) bytes"
            echo "groups=$(cat tld-groups.json)" >> "$GITHUB_OUTPUT"
          else
            RC=$?
            echo "::error::cache-builder exited with code $RC"
            echo "--- stdout ---"
            cat tld-groups.json || true
            exit $RC
          fi

  scan:
    needs: fetch-tlds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        group: ${{ fromJSON(needs.fetch-tlds.outputs.tld-groups) }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: binaries
      - name: scan TLD group
        run: |
          chmod +x cache-builder
          ./cache-builder scan --tlds '${{ toJSON(matrix.group) }}'
      - name: upload partial bitmap
        uses: actions/upload-artifact@v7
        with:
          name: bitmap-${{ strategy.job-index }}
          path: partial-bitmap.bin

  merge:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: binaries
      - name: download partial bitmaps
        uses: actions/download-artifact@v8
      - name: merge cache
        run: chmod +x cache-builder && ./cache-builder merge --output cache.bin
      - name: compress cache
        run: gzip -9 cache.bin
      - name: generate checksum
        run: sha256sum cache.bin.gz > cache.sha256
      - name: recreate cache-latest tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete cache-latest --cleanup-tag -y || true
          git tag -f cache-latest
          git push origin refs/tags/cache-latest --force
      - name: publish cache release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create cache-latest cache.bin.gz cache.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title cache-latest \
            --notes "Automated domain availability cache build" \
            --prerelease
